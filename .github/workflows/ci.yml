name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck, build & pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Pack the published package
        working-directory: apps/server
        run: npm pack --pack-destination "$RUNNER_TEMP"

      - name: Smoke-test the tarball (self-contained install)
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          cd "$workdir"
          npm init -y >/dev/null
          npm install "$RUNNER_TEMP"/puente-*.tgz
          echo "— puente --version —"
          ./node_modules/.bin/puente --version
          echo "— puente info —"
          ./node_modules/.bin/puente info
