name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  commitlint:
    name: Commit messages
    # main is rebase-only, so every commit on a PR lands verbatim — lint each one.
    # Linting the PR title instead would check a string rebase never turns into a commit.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      - run: corepack enable

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint the commits this PR adds
        run: >-
          pnpm exec commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose

  build:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Node 24 runs the toolchain. The published package still supports Node >= 20,
      # which the smoke job proves against the real tarball.
      - uses: actions/setup-node@v7
        with:
          node-version: 24

      # pnpm comes from corepack, pinned by `packageManager` in package.json — no
      # third-party action in the path. The second setup-node is what wires up the
      # store cache: `cache: pnpm` shells out to pnpm, so pnpm must exist by then.
      - run: corepack enable

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      # Build first: @puente/shared must emit its .d.ts before tsc can resolve it
      # (server & web import @puente/shared, which is only typed via its built dist).
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Pack the published package
        working-directory: apps/server
        run: npm pack --pack-destination "$RUNNER_TEMP"

      - name: Upload tarball
        uses: actions/upload-artifact@v7
        with:
          name: puente-tarball
          path: ${{ runner.temp }}/puente-*.tgz
          retention-days: 3

  smoke:
    name: Smoke — runtime on Node ${{ matrix.node }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Non-EOL only. Node 20 is EOL (2026-04-30); test the floor (22) + current (24).
        node: [22, 24]
    steps:
      - name: Download tarball
        uses: actions/download-artifact@v8
        with:
          name: puente-tarball
          path: pkg

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}

      - name: Install the tarball into a clean project and run the CLI
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          cd "$workdir"
          npm init -y >/dev/null
          npm install "$GITHUB_WORKSPACE"/pkg/puente-*.tgz
          echo "— puente --version —"
          ./node_modules/.bin/puente --version
          echo "— puente info —"
          ./node_modules/.bin/puente info
