name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # pnpm 11 requires Node >= 22.13, so the build toolchain runs on Node 22.
      # (The published package itself still runs on Node >= 20 — see the smoke job.)
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Pack the published package
        working-directory: apps/server
        run: npm pack --pack-destination "$RUNNER_TEMP"

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: puente-tarball
          path: ${{ runner.temp }}/puente-*.tgz
          retention-days: 3

  smoke:
    name: Smoke — runtime on Node ${{ matrix.node }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: puente-tarball
          path: pkg

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}

      - name: Install the tarball into a clean project and run the CLI
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          cd "$workdir"
          npm init -y >/dev/null
          npm install "$GITHUB_WORKSPACE"/pkg/puente-*.tgz
          echo "— puente --version —"
          ./node_modules/.bin/puente --version
          echo "— puente info —"
          ./node_modules/.bin/puente info
