name: Release

on:
  push:
    branches: [main]
  # Escape hatch: publish the version currently checked out, without cutting a new
  # release. Use it when a release was tagged but never reached npm.
  workflow_dispatch:

# Never let two releases race: cutting a tag and publishing must not interleave.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Prepare release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # release-please namespaces its outputs by package path, so a manifest with
    # packages under apps/server emits `apps/server--release_created` — never a bare
    # `release_created` (that only exists when the package sits at the repo root).
    # Reading the bare name yielded an empty string, so publish silently skipped.
    outputs:
      release_created: ${{ steps.release.outputs['apps/server--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to npm
    needs: release-please
    # always(): on workflow_dispatch the release-please job is skipped, and a skipped
    # dependency would otherwise skip this one too.
    if: ${{ always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing (tokenless) + provenance
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # pnpm comes from corepack, pinned by `packageManager`. The second setup-node
      # wires up the store cache, which needs pnpm to already be on PATH.
      - run: corepack enable

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # Trusted publishing (OIDC) needs npm >= 11.5.1, newer than the one bundled
      # with Node 24. No NPM_TOKEN anywhere — auth comes from the OIDC id-token.
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # No --provenance flag and no token: with trusted publishing npm authenticates
      # via OIDC and generates provenance automatically. Public access comes from each
      # package's publishConfig.
      - name: Publish puente
        working-directory: apps/server
        run: npm publish

      - name: Publish @pauldvlp/puente (alias, version-locked to puente)
        run: |
          node scripts/sync-alias.mjs
          cd packages/alias
          npm publish
