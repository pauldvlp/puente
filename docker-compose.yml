services:
  puente:
    build: .
    image: puente:local
    container_name: puente
    restart: unless-stopped
    ports:
      - "5006:5006"
    environment:
      PUENTE_PORT: "5006"
      PUENTE_DATA_DIR: /data
    volumes:
      - puente-data:/data
      # Optional: reuse your SSH aliases/keys for managing remote nodes.
      # - ${HOME}/.ssh:/root/.ssh:ro

volumes:
  puente-data:
